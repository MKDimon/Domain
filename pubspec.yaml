name: domain_app
description: Domain — community platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  photo_view: ^0.15.0
  flutter_markdown: any
  emoji_picker_flutter: ^4.3.0
  flutter_colorpicker: ^1.1.0
  just_audio: ^0.9.42
  just_audio_windows: ^0.2.2

  # Desktop
  window_manager: ^0.4.3
  tray_manager: ^0.5.2
  launch_at_startup: ^0.5.1
  hotkey_manager: ^0.2.3

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  connectivity_plus: ^6.1.4

  # Voice (WebRTC)
  flutter_webrtc: ^1.4.0
  permission_handler: ^11.3.1

  # Native audio processor
  domain_audio:
    path: packages/domain_audio

  cupertino_icons: ^1.0.8
  lua_dardo: ^0.0.5
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.svg
